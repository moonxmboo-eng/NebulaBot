<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebulaBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="noise"></div>
    <div class="shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">NB</div>
                <div>
                    <p class="eyebrow">Agentic Chat Infra</p>
                    <h1>NebulaBot</h1>
                </div>
            </div>
            <button id="new-session" class="primary-button" type="button">New Session</button>
            <div class="status-card">
                <p class="status-label">Runtime</p>
                <div class="status-row">
                    <span id="provider-pill" class="pill">loading</span>
                    <span id="health-pill" class="pill muted">checking</span>
                </div>
                <p class="status-copy">
                    AstrBot-style MVP with Web Chat, plugin commands, provider routing, and session memory.
                </p>
            </div>
            <section class="session-panel">
                <div class="panel-title">
                    <span>Sessions</span>
                    <span id="session-count" class="mono">0</span>
                </div>
                <div id="session-list" class="session-list"></div>
            </section>
        </aside>

        <main class="chat-stage">
            <header class="chat-header">
                <div>
                    <p class="eyebrow">Web Console</p>
                    <h2 id="chat-title">New Session</h2>
                </div>
                <div class="header-hint mono">/help · /echo · /persona</div>
            </header>

            <section id="chat-box" class="chat-box"></section>

            <form id="chat-form" class="composer">
                <label for="message-input" class="sr-only">Message</label>
                <textarea id="message-input" rows="1" placeholder="Message NebulaBot..." required></textarea>
                <button type="submit" class="primary-button">Send</button>
            </form>
        </main>
    </div>

    <template id="message-template">
        <article class="bubble">
            <p class="bubble-role"></p>
            <div class="bubble-content"></div>
        </article>
    </template>

    <script src="/static/script.js"></script>
</body>
</html>
