<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebulaBot Web UI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="chat-container">
        <header class="chat-header">
            <div class="bot-info">
                <div class="avatar">🌌</div>
                <div>
                    <h1>NebulaBot</h1>
                    <p class="status">Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle">🌙</button>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message bot-message">
                <div class="message-content">
                    Hello! I'm NebulaBot. How can I help you today?
                </div>
            </div>
        </main>

        <footer class="chat-input-area">
            <form id="chat-form">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required>
                <button type="submit" id="send-button">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
